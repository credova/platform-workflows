name: compliance
description: >
  Process and policy gates. Ensures teams follow required procedures.
  Default behavior: opt-out. All checks run unless explicitly disabled.

inputs:
  ticket:
    description: PR/commit must reference a Shortcut ticket (sc-NNNNN or Shortcut link)
    required: false
    default: "true"

runs:
  using: composite
  steps:
    # Run the check but don't abort the composite yet: capture the outcome so
    # the comment step can surface the reason, then fail at the end.
    - name: Check ticket reference
      id: ticket
      if: inputs.ticket == 'true'
      shell: bash
      env:
        PR_TITLE: ${{ github.event.pull_request.title || '' }}
        PR_BODY: ${{ github.event.pull_request.body || '' }}
        PR_BRANCH: ${{ github.head_ref || github.ref_name }}
        HEAD_COMMIT_MSG: ${{ github.event.head_commit.message || '' }}
        PR_NUMBER: ${{ github.event.pull_request.number || '' }}
        REPO: ${{ github.repository }}
        GH_TOKEN: ${{ github.token }}
        REASON_FILE: ${{ runner.temp }}/compliance-reason.txt
      run: |
        if "${{ github.action_path }}/../../scripts/check-shortcut-ticket.sh"; then
          echo "outcome=success" >> "$GITHUB_OUTPUT"
        else
          echo "outcome=failure" >> "$GITHUB_OUTPUT"
        fi

    # Upsert the compliance PR comment (passed / failed + reason).
    - name: Post compliance comment
      if: always() && inputs.ticket == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        JOB_OUTCOME: ${{ steps.ticket.outputs.outcome }}
        REASON_FILE: ${{ runner.temp }}/compliance-reason.txt
      run: bash "${{ github.action_path }}/../../scripts/post-compliance-comment.sh"

    - name: Fail on compliance errors
      if: steps.ticket.outputs.outcome == 'failure'
      shell: bash
      run: exit 1
