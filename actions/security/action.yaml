name: security
description: >
  Vulnerability and code scanning. Selectable scan types.
  Default behavior: opt-out. All applicable scans run unless explicitly disabled.

inputs:
  packages:
    description: Scan dependency manifests (package.json, go.mod, etc.) via trivy
    required: false
    default: "true"
  code:
    description: Static analysis via opengrep
    required: false
    default: "true"
  container:
    description: Container image scanning via trivy (usually called internally by container action)
    required: false
    default: "false"
  image-ref:
    description: Container image reference for container scanning
    required: false
    default: ""
  severity:
    description: Minimum severity to fail on
    required: false
    default: HIGH

runs:
  using: composite
  steps:
    - name: Log scan configuration
      shell: bash
      run: |
        echo "Security scan configuration:"
        echo "  packages: ${{ inputs.packages }}"
        echo "  code: ${{ inputs.code }}"
        echo "  container: ${{ inputs.container }}"
        echo "  severity: ${{ inputs.severity }}"

    - name: Package vulnerability scan
      if: inputs.packages == 'true'
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: fs
        scan-ref: .
        severity: ${{ inputs.severity }}
        exit-code: "1"
        ignore-unfixed: true

    - name: Install opengrep
      if: inputs.code == 'true'
      shell: bash
      run: curl -fsSL https://raw.githubusercontent.com/opengrep/opengrep/main/install.sh | bash

    - name: Code static analysis
      if: inputs.code == 'true'
      shell: bash
      env:
        SEVERITY: ${{ inputs.severity }}
      run: ${{ github.action_path }}/../../scripts/opengrep-scan.sh

    - name: Container image scan
      if: inputs.container == 'true' && inputs.image-ref != ''
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: image
        image-ref: ${{ inputs.image-ref }}
        severity: ${{ inputs.severity }}
        exit-code: "1"
        ignore-unfixed: true
