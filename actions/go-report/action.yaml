name: go-report
description: Post or update Go job results (lint/security/test) on a PR comment

inputs:
  job:
    description: '"lint", "security", or "test"'
    required: true
  outcome:
    description: "Step outcome: success | failure | skipped | cancelled"
    required: true
  output-file:
    description: Path to captured command output
    required: false
    default: ""
  lint-enabled:
    description: Whether the lint job runs (disabled -> section shows "Not enabled")
    required: false
    default: "true"
  security-enabled:
    description: Whether the security job runs
    required: false
    default: "true"
  test-enabled:
    description: Whether the test job runs
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Post Go comment
      if: github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        JOB: ${{ inputs.job }}
        JOB_OUTCOME: ${{ inputs.outcome }}
        OUTPUT_FILE: ${{ inputs.output-file }}
        LINT_ENABLED: ${{ inputs.lint-enabled }}
        SECURITY_ENABLED: ${{ inputs.security-enabled }}
        TEST_ENABLED: ${{ inputs.test-enabled }}
      run: bash "${{ github.action_path }}/../../scripts/post-go-comment.sh"
