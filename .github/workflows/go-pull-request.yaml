name: "Go: Pull Request"

on:
  workflow_call:
    inputs:
      go-version:
        description: Go version (used by mise, not setup-language directly)
        type: string
        required: false
        default: ""
      test-command:
        description: "Custom test command (default: mise run test)"
        type: string
        required: false
        default: ""
      lint:
        description: Run mise lint
        type: boolean
        required: false
        default: true
      security-mise:
        description: Run mise security (Go-specific security checks)
        type: boolean
        required: false
        default: true
      test:
        description: Run tests
        type: boolean
        required: false
        default: true

      # Container
      container:
        description: Build and scan a container image on PR (no push)
        type: boolean
        required: false
        default: true
      image:
        description: "Single image - name:dockerfile or just name (defaults to ./Dockerfile)"
        type: string
        required: false
        default: ""
      images:
        description: "Multi-image YAML list with name, dockerfile, optional target, context, platform"
        type: string
        required: false
        default: ""
      platform:
        description: "Target platform (e.g. linux/amd64, linux/arm64)"
        type: string
        required: false
        default: linux/arm64

      # Run ordering
      run-order:
        description: "Job execution order: linear, parallel (default), checks-first"
        type: string
        required: false
        default: parallel

      # Security overrides (source + image scanning via shared security action)
      security-packages:
        description: Run package vulnerability scan
        type: boolean
        required: false
        default: true
      security-licenses:
        description: Run license compliance scan
        type: boolean
        required: false
        default: true
      security-code:
        description: Run code static analysis
        type: boolean
        required: false
        default: true
      security-severity:
        description: Minimum severity to fail on
        type: string
        required: false
        default: HIGH

      # Compliance
      compliance-ticket:
        description: Require Shortcut ticket reference
        type: boolean
        required: false
        default: true

      # WarpBuild
      warpbuild-profile:
        description: "WarpBuild Docker Builder profile name"
        type: string
        required: false
        default: ""
      cache:
        description: "Enable WarpBuild dependency caching"
        type: boolean
        required: false
        default: false

      # Runner
      runner:
        description: "GitHub Actions runner label"
        type: string
        required: false
        default: warp-ubuntu-latest-arm64-4x

    secrets:
      RELEASE_DOWNLOADER_APP_ID:
        required: false
      RELEASE_DOWNLOADER_APP_PRIVATE_KEY:
        required: false
      WARPBUILD_API_KEY:
        required: false

jobs:
  # --- Input validation and image parsing ---
  validate:
    runs-on: ${{ inputs.runner }}
    outputs:
      image-matrix: ${{ steps.parse.outputs.image-matrix }}
    steps:
      - uses: actions/checkout@v6

      - name: Validate inputs
        shell: bash
        env:
          IMAGE: ${{ inputs.image }}
          IMAGES: ${{ inputs.images }}
        run: |
          if [ -n "${IMAGE}" ] && [ -n "${IMAGES}" ]; then
            echo "::error::Cannot specify both 'image' and 'images'. Use one or the other."
            exit 1
          fi

      - name: Parse image inputs
        id: parse
        uses: credova/platform-workflows/actions/parse-images@master
        with:
          image: ${{ inputs.image }}
          images: ${{ inputs.images }}
          container: ${{ inputs.container && 'true' || 'false' }}
          platform: ${{ inputs.platform }}
          repo-name: ${{ github.event.repository.name }}

  # ============================================================
  # Go-specific jobs: Lint, Security (mise), Test
  # These use mise tasks and post go-report PR comments
  # ============================================================

  lint:
    if: inputs.lint
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Generate cross-repo token
        id: cross-repo-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_DOWNLOADER_APP_ID }}
          private-key: ${{ secrets.RELEASE_DOWNLOADER_APP_PRIVATE_KEY }}
          owner: credova
          repositories: shared-configs

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
        env:
          MISE_GITHUB_TOKEN: ${{ steps.cross-repo-token.outputs.token || github.token }}
          GIT_CONFIG_COUNT: 1
          GIT_CONFIG_KEY_0: "url.https://x-access-token:${{ steps.cross-repo-token.outputs.token || github.token }}@github.com/.insteadOf"
          GIT_CONFIG_VALUE_0: "ssh://git@github.com/"

      - name: Run lint
        id: lint
        continue-on-error: true
        run: mise run lint 2>&1 | tee lint-output.txt
        env:
          GIT_CONFIG_COUNT: 1
          GIT_CONFIG_KEY_0: "url.https://x-access-token:${{ steps.cross-repo-token.outputs.token || github.token }}@github.com/.insteadOf"
          GIT_CONFIG_VALUE_0: "ssh://git@github.com/"

      - name: Post Go comment
        if: always() && github.event_name == 'pull_request'
        uses: credova/platform-workflows/actions/go-report@master
        with:
          job: lint
          outcome: ${{ steps.lint.outcome }}
          output-file: lint-output.txt

      - name: Fail on lint errors
        if: steps.lint.outcome == 'failure'
        shell: bash
        run: exit 1

  security-go:
    if: inputs.security-mise
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Generate cross-repo token
        id: cross-repo-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_DOWNLOADER_APP_ID }}
          private-key: ${{ secrets.RELEASE_DOWNLOADER_APP_PRIVATE_KEY }}
          owner: credova
          repositories: shared-configs

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
        env:
          MISE_GITHUB_TOKEN: ${{ steps.cross-repo-token.outputs.token || github.token }}
          GIT_CONFIG_COUNT: 1
          GIT_CONFIG_KEY_0: "url.https://x-access-token:${{ steps.cross-repo-token.outputs.token || github.token }}@github.com/.insteadOf"
          GIT_CONFIG_VALUE_0: "ssh://git@github.com/"

      - name: Run security
        id: security
        continue-on-error: true
        run: mise run security 2>&1 | tee security-output.txt
        env:
          GIT_CONFIG_COUNT: 1
          GIT_CONFIG_KEY_0: "url.https://x-access-token:${{ steps.cross-repo-token.outputs.token || github.token }}@github.com/.insteadOf"
          GIT_CONFIG_VALUE_0: "ssh://git@github.com/"

      - name: Post Go comment
        if: always() && github.event_name == 'pull_request'
        uses: credova/platform-workflows/actions/go-report@master
        with:
          job: security
          outcome: ${{ steps.security.outcome }}
          output-file: security-output.txt

      - name: Fail on security errors
        if: steps.security.outcome == 'failure'
        shell: bash
        run: exit 1

  test:
    if: inputs.test
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Generate cross-repo token
        id: cross-repo-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_DOWNLOADER_APP_ID }}
          private-key: ${{ secrets.RELEASE_DOWNLOADER_APP_PRIVATE_KEY }}
          owner: credova
          repositories: shared-configs

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
        env:
          MISE_GITHUB_TOKEN: ${{ steps.cross-repo-token.outputs.token || github.token }}
          GIT_CONFIG_COUNT: 1
          GIT_CONFIG_KEY_0: "url.https://x-access-token:${{ steps.cross-repo-token.outputs.token || github.token }}@github.com/.insteadOf"
          GIT_CONFIG_VALUE_0: "ssh://git@github.com/"

      - name: Run tests
        id: test
        continue-on-error: true
        shell: bash
        env:
          TEST_COMMAND: ${{ inputs.test-command }}
          GIT_CONFIG_COUNT: 1
          GIT_CONFIG_KEY_0: "url.https://x-access-token:${{ steps.cross-repo-token.outputs.token || github.token }}@github.com/.insteadOf"
          GIT_CONFIG_VALUE_0: "ssh://git@github.com/"
        run: |
          if [ -n "${TEST_COMMAND}" ]; then
            echo "Running: ${TEST_COMMAND}"
            eval "${TEST_COMMAND}" 2>&1 | tee test-output.txt
          else
            mise run test 2>&1 | tee test-output.txt
          fi

      - name: Post Go comment
        if: always() && github.event_name == 'pull_request'
        uses: credova/platform-workflows/actions/go-report@master
        with:
          job: test
          outcome: ${{ steps.test.outcome }}
          output-file: test-output.txt

      - name: Fail on test errors
        if: steps.test.outcome == 'failure'
        shell: bash
        run: exit 1

  # --- Source security scan (shared action, separate from mise security) ---
  security-scan:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Generate cross-repo token
        id: cross-repo-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_DOWNLOADER_APP_ID }}
          private-key: ${{ secrets.RELEASE_DOWNLOADER_APP_PRIVATE_KEY }}
          owner: credova
          repositories: shared-configs

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
        env:
          MISE_GITHUB_TOKEN: ${{ steps.cross-repo-token.outputs.token || github.token }}
          GIT_CONFIG_COUNT: 1
          GIT_CONFIG_KEY_0: "url.https://x-access-token:${{ steps.cross-repo-token.outputs.token || github.token }}@github.com/.insteadOf"
          GIT_CONFIG_VALUE_0: "ssh://git@github.com/"

      - name: Download Go modules
        shell: bash
        env:
          GIT_CONFIG_COUNT: 1
          GIT_CONFIG_KEY_0: "url.https://x-access-token:${{ steps.cross-repo-token.outputs.token || github.token }}@github.com/.insteadOf"
          GIT_CONFIG_VALUE_0: "ssh://git@github.com/"
        run: go mod download

      - uses: credova/platform-workflows/actions/security@master
        with:
          packages: ${{ inputs.security-packages && 'true' || 'false' }}
          licenses: ${{ inputs.security-licenses && 'true' || 'false' }}
          code: ${{ inputs.security-code && 'true' || 'false' }}
          severity: ${{ inputs.security-severity }}

  # --- Container build (after checks pass) ---
  build:
    if: inputs.container && always() && !failure() && !cancelled()
    needs: [validate, lint, security-go, test, security-scan]
    runs-on: ${{ inputs.runner }}
    strategy:
      fail-fast: true
      matrix:
        include: ${{ fromJson(needs.validate.outputs.image-matrix) }}
    steps:
      - uses: actions/checkout@v6
      - name: Build container (${{ matrix.name }})
        uses: credova/platform-workflows/actions/container@master
        with:
          name: ${{ matrix.name }}
          dockerfile: ${{ matrix.dockerfile }}
          context: ${{ matrix.context }}
          target: ${{ matrix.target }}
          platform: ${{ matrix.platform }}
          build: "true"
          push: "false"
          warpbuild-profile: ${{ inputs.warpbuild-profile }}
          warpbuild-api-key: ${{ secrets.WARPBUILD_API_KEY }}

  # --- Compliance ---
  compliance:
    needs: [lint, security-go, test, security-scan, build]
    if: always() && !failure() && !cancelled()
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: credova/platform-workflows/actions/compliance@master
        with:
          ticket: ${{ inputs.compliance-ticket && 'true' || 'false' }}
