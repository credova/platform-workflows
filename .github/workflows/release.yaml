name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type: major, minor, patch"
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: warp-ubuntu-2404-x64-2x
    steps:
      - name: Generate workflow editor token
        id: workflow-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.WORKFLOW_EDITOR_APP_CLIENT_ID }}
          private-key: ${{ secrets.WORKFLOW_EDITOR_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-workflows: write

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ steps.workflow-token.outputs.token }}

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            # Triggered by a manually pushed tag - use it directly
            echo "tag=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
          else
            # Triggered by workflow_dispatch - compute next version
            echo "tag=" >> "${GITHUB_OUTPUT}"
          fi

      - name: Compute next version
        id: increment
        if: steps.tag.outputs.tag == ''
        uses: ./actions/increment-tag
        with:
          bump: ${{ github.event.inputs.bump || 'patch' }}

      - name: Set final tag
        id: final
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag || steps.increment.outputs.tag }}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Rewrite refs and push tag
        shell: bash
        env:
          TAG: ${{ steps.final.outputs.tag }}
          GIT_TOKEN: ${{ steps.workflow-token.outputs.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GIT_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          # Rewrite @master refs in a release commit, tag it, then reset master back.
          # master stays clean with @master refs; the tag snapshot has pinned refs.
          find . -not -path './.git/*' \( -name '*.yaml' -o -name '*.yml' \) \
            -exec grep -lF 'credova/platform-workflows/' {} \; \
            | xargs sed -i "s|credova/platform-workflows/\(.\+\)@v1.0.3|credova/platform-workflows/\1@${TAG}|g"
          git commit -am "chore: pin internal action refs to ${TAG}"
          RELEASE_SHA=$(git rev-parse HEAD)
          echo "RELEASE_SHA=${RELEASE_SHA}" >> "${GITHUB_ENV}"

          # For dispatch-triggered releases the tag doesn't exist yet; for tag-push
          # it already exists, so we move it to the pinned-refs commit.
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            git tag -f "${TAG}"
            git push origin "${TAG}" --force
          else
            git tag "${TAG}"
            git push origin "${TAG}"
          fi

          git reset --hard HEAD~1

      - name: Update major version tag
        shell: bash
        env:
          TAG: ${{ steps.final.outputs.tag }}
        run: |
          MAJOR=$(echo "${TAG}" | grep -oP 'v\d+')
          git tag -f "${MAJOR}" "${RELEASE_SHA}"
          git push origin "${MAJOR}" --force

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.final.outputs.tag }}
        run: |
          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes
