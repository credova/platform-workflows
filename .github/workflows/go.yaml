name: Go

on:
  workflow_call:
    inputs:
      # Mise tasks
      lint:
        description: Run mise lint
        type: boolean
        required: false
        default: true
      security:
        description: Run mise security
        type: boolean
        required: false
        default: true
      test:
        description: Run tests
        type: boolean
        required: false
        default: true
      test-command:
        description: "Custom test command (default: go test -v -race -coverprofile=coverage.out ./...)"
        type: string
        required: false
        default: ""

      # GoReleaser
      goreleaser:
        description: Run GoReleaser (snapshot on branch push, full release on tag)
        type: boolean
        required: false
        default: true
      goreleaser-args:
        description: Additional GoReleaser args
        type: string
        required: false
        default: ""

      # Runner
      runner:
        description: GitHub Actions runner label
        type: string
        required: false
        default: warp-ubuntu-latest-arm64-4x

jobs:
  lint:
    if: inputs.lint
    name: Lint
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Run lint
        run: mise run lint

  security:
    if: inputs.security
    name: Security
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Run security
        run: mise run security

  test:
    if: inputs.test
    name: Test
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Run tests
        shell: bash
        env:
          TEST_COMMAND: ${{ inputs.test-command }}
        run: |
          if [ -n "${TEST_COMMAND}" ]; then
            echo "Running: ${TEST_COMMAND}"
            eval "${TEST_COMMAND}"
          else
            go test -v -race -coverprofile=coverage.out ./...
          fi

  goreleaser:
    name: GoReleaser
    needs: [lint, security, test]
    if: inputs.goreleaser && !failure() && !cancelled()
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Configure git for private modules
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
          echo "GOPRIVATE=github.com/credova/*" >> $GITHUB_ENV

      - name: Set snapshot flag for non-tag builds
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: echo "GORELEASER_FLAGS=--snapshot" >> $GITHUB_ENV

      - name: Generate Homebrew token
        if: startsWith(github.ref, 'refs/tags/v')
        id: homebrew-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.HOMEBREW_PUBLISHER_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_PUBLISHER_APP_PRIVATE_KEY }}
          owner: credova
          repositories: homebrew-tap

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean ${{ env.GORELEASER_FLAGS }} ${{ inputs.goreleaser-args }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          HOMEBREW_GITHUB_API_TOKEN: ${{ steps.homebrew-token.outputs.token }}
