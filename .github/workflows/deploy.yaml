name: Deploy

on:
  workflow_call:
    inputs:
      # Language (optional - for repos that need tests before deploy)
      language:
        description: "Language runtime to setup: go, node, kotlin, python, ruby, dotnet"
        type: string
        required: false
        default: ""
      language-version:
        description: Language/runtime version (required if language is set)
        type: string
        required: false
        default: ""
      test-command:
        description: Custom test command (defaults per language if empty)
        type: string
        required: false
        default: ""

      # Container (on by default - disable for non-container repos)
      container:
        description: Build, scan, and push a container image
        type: boolean
        required: false
        default: true
      image:
        description: "Single image - name:dockerfile or just name (defaults to ./Dockerfile)"
        type: string
        required: false
        default: ""
      images:
        description: "Multi-image YAML list with name, dockerfile, optional target, context, platform"
        type: string
        required: false
        default: ""
      platform:
        description: "Target platform for single-image builds (e.g. linux/amd64, linux/arm64)"
        type: string
        required: false
        default: linux/amd64

      # WarpBuild (opt-in)
      warpbuild-profile:
        description: "WarpBuild Docker Builder profile name (enables WarpBuild remote builds)"
        type: string
        required: false
        default: ""

      # Caching
      cache:
        description: "Enable dependency caching via WarpBuild cache (requires WarpBuild runners)"
        type: boolean
        required: false
        default: false

      # Runner
      runner:
        description: "GitHub Actions runner label"
        type: string
        required: false
        default: warp-ubuntu-2404-x64-2x

      container-reuse:
        description: Check for existing image before building
        type: boolean
        required: false
        default: true

      # Deployment (on by default - disable for release-only repos)
      deploy:
        description: Deploy to Cloud Run via pctl
        type: boolean
        required: false
        default: true
      config-path:
        description: Path to CUE config directory
        type: string
        required: false
        default: deployments/
      canary:
        description: Top-level canary traffic percentage
        type: number
        required: false
        default: 0
      require-approval:
        description: Require manual approval for production
        type: boolean
        required: false
        default: true

      # Hotfix mode - tag push → build → approve → production (skip staging/tests)
      hotfix:
        description: "Hotfix mode: skip staging and tests. Deploy straight to production."
        type: boolean
        required: false
        default: false

      # Security
      security-severity:
        description: Minimum severity to fail container scan on
        type: string
        required: false
        default: HIGH

      # Notifications
      notifications:
        description: "Send Slack notifications during deployment"
        type: boolean
        required: false
        default: true

      # Auth
      project-id:
        description: GCP project ID
        type: string
        required: false
        default: ""
      workload-identity-provider:
        description: Workload Identity Provider resource name
        type: string
        required: false
        default: ""
      service-account:
        description: Service account email to impersonate via WIF
        type: string
        required: false
        default: ""

    secrets:
      RELEASE_DOWNLOADER_APP_ID:
        required: false
      RELEASE_DOWNLOADER_APP_PRIVATE_KEY:
        required: false
      WARPBUILD_API_KEY:
        required: false
      PCTL_SLACK_BOT_TOKEN:
        required: false

jobs:
  # --- Input validation and image parsing ---
  validate-inputs:
    runs-on: ${{ inputs.runner }}
    outputs:
      image-matrix: ${{ steps.parse.outputs.image-matrix }}
      deploy-tag: ${{ steps.tag.outputs.deploy-tag }}
    steps:
      - uses: actions/checkout@v7

      - name: Validate inputs
        shell: bash
        env:
          IMAGE: ${{ inputs.image }}
          IMAGES: ${{ inputs.images }}
          LANGUAGE: ${{ inputs.language }}
          LANGUAGE_VERSION: ${{ inputs.language-version }}
        run: |
          if [ -n "${IMAGE}" ] && [ -n "${IMAGES}" ]; then
            echo "::error::Cannot specify both 'image' and 'images'. Use one or the other."
            exit 1
          fi
          if [ -n "${LANGUAGE}" ] && [ -z "${LANGUAGE_VERSION}" ]; then
            echo "::error::language-version is required when language is set."
            exit 1
          fi

      - name: Parse image inputs
        id: parse
        uses: credova/platform-workflows/actions/parse-images@v1.0.3
        with:
          image: ${{ inputs.image }}
          images: ${{ inputs.images }}
          container: ${{ inputs.container && 'true' || 'false' }}
          platform: ${{ inputs.platform }}
          repo-name: ${{ github.event.repository.name }}

      - name: Compute deploy tag
        id: tag
        shell: bash
        env:
          HOTFIX: ${{ inputs.hotfix }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          if [ "${HOTFIX}" = "true" ]; then
            echo "deploy-tag=${REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "deploy-tag=${SHA}" >> "$GITHUB_OUTPUT"
          fi

  # --- Generate release download token (for pctl) ---
  auth:
    if: inputs.deploy
    runs-on: ${{ inputs.runner }}
    outputs:
      token: ${{ steps.token.outputs.token }}
    steps:
      - uses: actions/checkout@v7

      - name: Generate release download token
        id: token
        uses: credova/platform-workflows/actions/auth-release-token@v1.0.3
        with:
          client-id: ${{ secrets.RELEASE_DOWNLOADER_APP_ID }}
          private-key: ${{ secrets.RELEASE_DOWNLOADER_APP_PRIVATE_KEY }}

  # --- Tests (only when language is set, skipped for hotfix) ---
  test:
    if: inputs.language != '' && !inputs.hotfix
    needs: [validate-inputs]
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup language
        uses: credova/platform-workflows/actions/setup-language@v1.0.3
        with:
          language: ${{ inputs.language }}
          version: ${{ inputs.language-version }}
          cache: ${{ inputs.cache && 'true' || 'false' }}

      - name: Run tests
        shell: bash
        env:
          LANGUAGE: ${{ inputs.language }}
          TEST_COMMAND: ${{ inputs.test-command }}
        run: |
          if [ -n "${TEST_COMMAND}" ]; then
            echo "Running: ${TEST_COMMAND}"
            eval "${TEST_COMMAND}"
            exit $?
          fi

          case "${LANGUAGE}" in
            go)     go test ./... ;;
            node)   npm ci && npm test ;;
            kotlin) ./gradlew test ;;
            python) pip install -e ".[test]" 2>/dev/null || pip install -e . && pytest ;;
            ruby)   bundle install && bundle exec rake test ;;
            dotnet) dotnet test ;;
          esac

  # --- Container build, scan, push (only when container is enabled) ---
  build-scan-push:
    if: inputs.container && always() && !failure() && !cancelled()
    needs: [validate-inputs, test]
    runs-on: ${{ inputs.runner }}
    strategy:
      fail-fast: true
      matrix:
        include: ${{ fromJson(needs.validate-inputs.outputs.image-matrix) }}
    steps:
      - uses: actions/checkout@v7

      - name: Build, scan, and push image (${{ matrix.name }})
        uses: credova/platform-workflows/actions/container@v1.0.3
        with:
          name: ${{ matrix.name }}
          dockerfile: ${{ matrix.dockerfile }}
          context: ${{ matrix.context }}
          target: ${{ matrix.target }}
          platform: ${{ matrix.platform }}
          build: "true"
          push: "true"
          reuse: ${{ !inputs.hotfix && inputs.container-reuse && 'true' || 'false' }}
          tag: ${{ needs.validate-inputs.outputs.deploy-tag }}
          project-id: ${{ inputs.project-id }}
          workload-identity-provider: ${{ inputs.workload-identity-provider }}
          service-account: ${{ inputs.service-account }}
          severity: ${{ inputs.security-severity }}
          warpbuild-profile: ${{ inputs.warpbuild-profile }}
          warpbuild-api-key: ${{ secrets.WARPBUILD_API_KEY }}

  # --- Deploy staging (skipped for hotfix) ---
  deploy-staging:
    if: inputs.deploy && !inputs.hotfix && always() && !failure() && !cancelled()
    needs: [auth, build-scan-push, test, validate-inputs]
    runs-on: ${{ inputs.runner }}
    environment: staging
    steps:
      - uses: actions/checkout@v7

      - name: Deploy to staging
        uses: credova/platform-workflows/actions/deployment@v1.0.3
        with:
          target: ${{ inputs.config-path }}
          tag: ${{ needs.validate-inputs.outputs.deploy-tag }}
          config-path: ${{ inputs.config-path }}
          project-id: ${{ inputs.project-id }}
          workload-identity-provider: ${{ inputs.workload-identity-provider }}
          slack-token: ${{ secrets.PCTL_SLACK_BOT_TOKEN }}
          token: ${{ needs.auth.outputs.token }}

  # --- Canary flow ---
  approve-canary:
    if: inputs.deploy && inputs.canary > 0 && always() && !failure() && !cancelled()
    needs: [deploy-staging, build-scan-push]
    runs-on: ${{ inputs.runner }}
    environment: production-canary
    steps:
      - run: echo "Canary deployment approved"

  deploy-canary:
    if: inputs.deploy && inputs.canary > 0
    needs: [auth, approve-canary, validate-inputs]
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v7
      - name: Deploy canary
        id: canary
        uses: credova/platform-workflows/actions/deployment@v1.0.3
        with:
          target: ${{ inputs.config-path }}
          tag: ${{ needs.validate-inputs.outputs.deploy-tag }}
          canary: ${{ inputs.canary }}
          config-path: ${{ inputs.config-path }}
          project-id: ${{ inputs.project-id }}
          workload-identity-provider: ${{ inputs.workload-identity-provider }}
          slack-token: ${{ secrets.PCTL_SLACK_BOT_TOKEN }}
          token: ${{ needs.auth.outputs.token }}

  # --- Production approval ---
  approve-production:
    if: inputs.deploy && inputs.require-approval && always() && !failure() && !cancelled()
    needs: [build-scan-push, deploy-staging, deploy-canary]
    runs-on: ${{ inputs.runner }}
    environment: production
    steps:
      - run: echo "Production deployment approved"

  # --- Retag images for production ---
  retag-production:
    if: inputs.container && inputs.deploy && always() && !failure() && !cancelled()
    needs: [approve-production, validate-inputs]
    runs-on: ${{ inputs.runner }}
    strategy:
      fail-fast: true
      matrix:
        include: ${{ fromJson(needs.validate-inputs.outputs.image-matrix) }}
    steps:
      - uses: actions/checkout@v7

      - name: Retag image for production (${{ matrix.name }})
        uses: credova/platform-workflows/actions/container@v1.0.3
        with:
          name: ${{ matrix.name }}
          retag: "true"
          source-tag: ${{ needs.validate-inputs.outputs.deploy-tag }}
          tag: ${{ needs.validate-inputs.outputs.deploy-tag }}-prd
          project-id: ${{ inputs.project-id }}
          workload-identity-provider: ${{ inputs.workload-identity-provider }}
          service-account: ${{ inputs.service-account }}

  # --- Deploy production ---
  deploy-production:
    if: inputs.deploy && always() && !failure() && !cancelled()
    needs: [auth, approve-production, retag-production, validate-inputs]
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v7

      - name: Require Slack token for production
        if: inputs.notifications
        shell: bash
        env:
          PCTL_SLACK_BOT_TOKEN: ${{ secrets.PCTL_SLACK_BOT_TOKEN }}
        run: |
          if [ -z "${PCTL_SLACK_BOT_TOKEN}" ]; then
            echo "::error::PCTL_SLACK_BOT_TOKEN secret is required for production deploys when notifications are enabled"
            exit 1
          fi

      - name: Promote canary to production
        if: inputs.canary > 0
        uses: credova/platform-workflows/actions/deployment@v1.0.3
        with:
          target: ${{ inputs.config-path }}
          action: promote
          config-path: ${{ inputs.config-path }}
          project-id: ${{ inputs.project-id }}
          workload-identity-provider: ${{ inputs.workload-identity-provider }}
          slack-token: ${{ secrets.PCTL_SLACK_BOT_TOKEN }}
          token: ${{ needs.auth.outputs.token }}

      - name: Deploy to production (full)
        if: inputs.canary == 0
        uses: credova/platform-workflows/actions/deployment@v1.0.3
        with:
          target: ${{ inputs.config-path }}
          tag: ${{ needs.validate-inputs.outputs.deploy-tag }}-prd
          config-path: ${{ inputs.config-path }}
          project-id: ${{ inputs.project-id }}
          workload-identity-provider: ${{ inputs.workload-identity-provider }}
          slack-token: ${{ secrets.PCTL_SLACK_BOT_TOKEN }}
          token: ${{ needs.auth.outputs.token }}

  # --- Release tag + GitHub Release ---
  release:
    needs: [deploy-production, validate-inputs]
    if: always() && !failure() && !cancelled()
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Normal deploy: increment tag and create release
      - name: Create release tag
        if: ${{ !inputs.hotfix }}
        id: tag
        uses: credova/platform-workflows/actions/increment-tag@v1.0.3

      - name: Create GitHub Release
        if: ${{ !inputs.hotfix }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes

      # Hotfix: release from the tag that triggered the workflow
      - name: Create GitHub Release (hotfix)
        if: ${{ inputs.hotfix }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.validate-inputs.outputs.deploy-tag }}
        run: |
          gh release create "${TAG}" \
            --title "${TAG} (hotfix)" \
            --generate-notes \
            --notes-start-tag "$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo '')" \
            2>/dev/null || echo "Release ${TAG} already exists, skipping"

  # --- Cancel superseded pending deploys ---
  cancel-superseded:
    if: inputs.deploy && !inputs.hotfix
    needs: [deploy-production]
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Cancel superseded pending deploys
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          echo "Checking for superseded pending deploys..."

          WAITING_RUNS=$(gh api "repos/${REPO}/actions/runs?status=waiting" \
            --jq '.workflow_runs[] | select(.head_sha != env.CURRENT_SHA) | .id')

          for run_id in ${WAITING_RUNS}; do
            echo "Cancelling superseded run #${run_id}"
            gh api "repos/${REPO}/actions/runs/${run_id}/cancel" -X POST || true
          done
