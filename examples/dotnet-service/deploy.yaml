# Example: .NET service with Cloud Run deploy
name: Deploy
on:
  push:
    branches: [master]
    tags: ["v*"]
permissions:
  contents: write
  id-token: write
jobs:
  deploy:
    uses: credova/platform-workflows/.github/workflows/dotnet-deploy.yaml@master
    secrets: inherit
    with:
      container: true
      release: true
