# Example: Node.js SDK/library (no container, no deploy)
name: Pull Request
on:
  pull_request:
    branches: [master]
permissions:
  contents: read
  pull-requests: write
jobs:
  ci:
    uses: credova/platform-workflows/.github/workflows/node-pull-request.yaml@v1.0.0
    secrets: inherit
    with:
      container: false
